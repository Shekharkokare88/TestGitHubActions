name: autolinter
on:
  push:
    paths:
      - "*.py"

permissions:
  contents: read

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Linter
        run: pip install ruff

      - name: Run Linter
        run: ruff check .
